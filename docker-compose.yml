services:
  # 1. Altyapı: RabbitMQ (Sabit Container)
  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - kargo_network
    container_name: kargo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  # 2. Altyapı: PostgreSQL (Sabit Container)
  postgres:
    image: postgres:15
    networks:
      - kargo_network
    container_name: kargo_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kargouser
      POSTGRES_PASSWORD: kargopassword
      POSTGRES_DB: kargodb
    restart: unless-stopped

  # 3. Kargo API Container'ı
  kargo-api:
    build:
      context: ./kargo-api
      dockerfile: Dockerfile
    container_name: kargo_api_service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=kargouser
      - DB_PASSWORD=kargopassword
      - DB_DATABASE=kargodb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - kargo_network
    ports:
      - "3000:3000"
    depends_on:
      - rabbitmq
      - postgres
    restart: always

  # 4. Kargo Job (Worker) Container'ları
  # --- 1. İŞÇİ: BORUSAN WORKER ---
  borusan_worker:
    build:
      context: ./kargo-worker
    container_name: borusan_worker_service
    environment:
      - CARGO_PROVIDER=Borusan
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=kargouser
      - DB_PASSWORD=kargopassword
      - DB_DATABASE=kargodb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - CARGO_API_BASE_URL=http://kargoapi:8000
      - CARGO_API_USERNAME=PO_ARVATO_DEV
      - CARGO_API_PASSWORD=Arvato321!
    depends_on:
      - rabbitmq
      - postgres
      - kargo-api
      - kargoapi
    networks:
      - kargo_network
    restart: always

  # --- 2. İŞÇİ: ARAS WORKER ---
  aras_worker:
    build:
      context: ./kargo-worker
    container_name: aras_worker_service
    environment:
      - CARGO_PROVIDER=Aras
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=kargouser
      - DB_PASSWORD=kargopassword
      - DB_DATABASE=kargodb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - CARGO_API_BASE_URL=http://kargoapi:8000
      - CARGO_API_USERNAME=PO_ARVATO_DEV
      - CARGO_API_PASSWORD=Arvato321!
    depends_on:
      - rabbitmq
      - postgres
      - kargo-api
      - kargoapi
    networks:
      - kargo_network
    restart: always

  # 5. Test Simülatörü: kargoapi (Borusan'ın local simülasyonu)
  kargoapi:
    build:
      context: ./kargoapi
      target: runtime
    container_name: kargoapi_service
    environment:
      - PORT=8000
      # İstenirse override edilebilir (varsayılanlar zaten bunlar):
      # - API_USERNAME=PO_ARVATO_DEV
      # - API_PASSWORD=Arvato321!
      # - TOKEN_TTL_SECONDS=3600
    ports:
      - "8000:8000"
    networks:
      - kargo_network
    restart: unless-stopped

  # 6. Frontend Dashboard
  kargo-dashboard:
    build:
      context: ./kargo-dashboard
      args:
        - "VITE_KARGO_API_URL=http://localhost:3000"
    container_name: kargo_dashboard_service
    ports:
      - "8090:80"
    depends_on:
      - kargo-api
    networks:
      - kargo_network
    restart: unless-stopped

networks:
  kargo_network:
    driver: bridge
